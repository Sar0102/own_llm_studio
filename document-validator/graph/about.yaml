# Document Validator — секция графа для doc_type: about
# Читает ТОЛЬКО worker этого документа. Рёбра между документами — в graph/edges.yaml

doc_type: about
title: Описание
sections:
- name: Назначение
- name: Преимущества
- name: Системные требования
  children:
  - name: Необходимое программное обеспечение
    markers:
    - ref
  - name: Аппаратное обеспечение
    markers:
    - table
- name: Типовые решения
  children:
  - name: Типовое решение
- name: Концептуальная модель предметной области
  markers:
  - uml
- name: Основные функции
  markers:
  - table
- name: Варианты и сценарии использования
  markers:
  - uml
  children:
  - name: Сценарий использования
  - name: Сценарий использования n
- name: Нефункциональные особенности
- name: Совместимость с выпущенными клиентами
notes:
- id: N-ABOUT-1
  scope: intra-doc
  text: 'В «Основные функции» перечисляются только сущностные функции; полный перечень — в «Варианты и
    сценарии использования».

    '
facts_to_extract:
  Варианты и сценарии использования:
    fact: scenario_names
    spec: Список названий сценариев (только заголовки, без содержимого).
  Необходимое программное обеспечение:
    fact: spo_list
    spec: Список наименований СПО (ПО + версия, если указана), по одному элементу на позицию.
  Нефункциональные особенности:
    fact: section_digest
    spec: 'Дайджест ≤ 15 строк: ключевые утверждения раздела своими словами.'
  Сценарий использования:
    fact: scenario_names
    spec: Список названий сценариев (только заголовки, без содержимого).
  Сценарий использования n:
    fact: scenario_names
    spec: Список названий сценариев (только заголовки, без содержимого).
