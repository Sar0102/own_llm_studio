# Document Validator — секция графа для doc_type: architecture
# Читает ТОЛЬКО worker этого документа. Рёбра между документами — в graph/edges.yaml

doc_type: architecture
title: Детальная архитектура
sections:
- name: Структура
  children:
  - name: Компонентно-логическая диаграмма
    markers:
    - uml
  - name: Компоненты
    markers:
    - table
  - name: Программные интерфейсы
  - name: Схемы структур данных
  - name: Физические модели баз данных
  - name: Элементы развертывания
    markers:
    - table
  - name: Диаграммы развертывания
    markers:
    - link
- name: Поведение
  children:
  - name: Взаимодействия
    markers:
    - table
  - name: Диаграммы последовательностей
    markers:
    - uml
  - name: Механизмы безопасности
  - name: Прочие поведенческие механизмы
- name: Прочие аспекты
  children:
  - name: Сценарии отказа
    markers:
    - table
notes:
- id: N-AR-1
  scope: intra-doc
  text: 'Компонентно-логическая диаграмма основана на: Компоненты, Варианты и сценарии использования (акторы),
    Программные интерфейсы, Взаимодействия.

    '
- id: N-AR-2
  scope: intra-doc
  text: 'Диаграммы последовательностей — графическое представление каждого use case.

    '
facts_to_extract:
  Взаимодействия:
    fact: item_names
    spec: Список названий пунктов/подразделов раздела.
  Диаграммы последовательностей:
    fact: scenario_names
    spec: Список названий сценариев (только заголовки, без содержимого).
  Компоненты:
    fact: presence
    spec: true/false — раздел или документ присутствует.
  Механизмы безопасности:
    fact: section_digest
    spec: 'Дайджест ≤ 15 строк: ключевые утверждения раздела своими словами.'
  Программные интерфейсы:
    fact: presence
    spec: true/false — раздел или документ присутствует.
  Сценарии отказа:
    fact: spo_list
    spec: Список наименований СПО (ПО + версия, если указана), по одному элементу на позицию.
  Физические модели баз данных:
    fact: item_names
    spec: Список названий пунктов/подразделов раздела.
  Элементы развертывания:
    fact:
    - item_names
    - presence
    spec: Список названий пунктов/подразделов раздела.
